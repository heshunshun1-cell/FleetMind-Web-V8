<!DOCTYPE html>
<html>
<head>
    <!-- 网页标题 -->
    <title>FleetMind RAG Assistant</title>

    <!-- 连接 CSS 样式文件 -->
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="container">

        <!-- 页面标题 -->
        <h1>FleetMind RAG Assistant</h1>

        <!-- 页面说明 -->
        <p class="description">
            Ask questions about fleet policy, route notes, cost issues, and risk rules.
        </p>

        <!-- RAG 问答表单：用户输入问题 -->
        <form method="POST" class="rag-form">
            <label for="question">Your Question</label>

            <!-- name="question" 要和 app.py 里的 request.form.get("question") 对应 -->
            <textarea
                id="question"
                name="question"
                rows="4"
                placeholder="Example: what should we do with high delay trips?"
            >{{ question }}</textarea>

            <!-- 提交问题 -->
            <button type="submit">Ask Assistant</button>
        </form>

        <!-- 如果有回答，就显示回答 -->
        {% if answer %}
        <div class="rag-answer">
            <h2>Answer</h2>
            <pre>{{ answer }}</pre>
        </div>
        {% endif %}

        <!-- 如果有来源文件，就显示 sources -->
        {% if sources %}
        <div class="rag-sources">
            <h2>Sources</h2>
            <ul>
                {% for source in sources %}
                <li>{{ source }}</li>
                {% endfor %}
            </ul>
        </div>
        {% endif %}

        <!-- 返回首页 -->
        <p>
            <a href="/" class="button">Back to Home</a>
        </p>

    </div>
</body>
</html>
