<!DOCTYPE html>
<html>
<head>
    <title>Add New Truck - FleetMind</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="container">
        <h1>Add and Analyse a New Truck</h1>

        <p>
            Enter anonymised truck information below.
            Please do not enter real driver names, real plate numbers, client names, or private routes.
        </p>

        <!-- 
            这个 form 会把用户输入的数据提交到 /new-truck。
            method="POST" 表示提交表单数据。
        -->
        <form action="/new-truck" method="POST">

            <!-- 车辆基本信息 -->
            <div class="card">
                <h2>Basic Information</h2>

                <label>Truck ID</label>
                <input type="text" name="truck_id" placeholder="Example: Truck 013" required>

                <label>Driver</label>
                <input type="text" name="driver" placeholder="Example: Driver M" required>

                <label>Route</label>
                <input type="text" name="route" placeholder="Example: Chongqing to Beijing" required>
            </div>

            <!-- 收入信息 -->
            <div class="card">
                <h2>Revenue</h2>

                <label>Revenue ($)</label>
                <input type="number" step="0.01" name="revenue" placeholder="Example: 70000" required>
            </div>

            <!-- 成本信息 -->
            <div class="card">
                <h2>Cost Information</h2>

                <label>Fuel Cost ($)</label>
                <input type="number" step="0.01" name="fuel_cost" placeholder="Example: 23000" required>

                <label>Toll Cost ($)</label>
                <input type="number" step="0.01" name="toll_cost" placeholder="Example: 8000" required>

                <label>Repair Cost ($)</label>
                <input type="number" step="0.01" name="repair_cost" placeholder="Example: 5000" required>

                <label>Salary Cost ($)</label>
                <input type="number" step="0.01" name="salary_cost" placeholder="Example: 11000" required>

                <label>Insurance Cost ($)</label>
                <input type="number" step="0.01" name="insurance_cost" placeholder="Example: 3000" required>

                <label>Other Cost ($)</label>
                <input type="number" step="0.01" name="other_cost" placeholder="Example: 2000" required>
            </div>

            <!-- 提交按钮 -->
            <button type="submit" class="button">Analyse New Truck</button>
        </form>

        <a href="/" class="back-link">Back to Home</a>
    </div>
</body>
</html>
